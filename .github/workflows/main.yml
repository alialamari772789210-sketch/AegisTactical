name: Aegis Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  RELEASE_VERSION: v1.0.8

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 1. إعطاء صلاحيات لملفاتك الخاصة وملف Gradle
      - name: Grant permissions
        run: |
          chmod +x gradlew
          chmod +x sync.sh

      # 2. تشغيل ملف المزامنة (الذي ظهر في صورتك) قبل البناء
      - name: Run Tactical Sync
        run: ./sync.sh

      # 3. بناء نسخة الـ APK
      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace --info

      # 4. رفع الملف الناتج
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        if: success() # لن يتم الرفع إلا إذا نجح البناء
        with:
          files: app/build/outputs/apk/debug/*.apk
          tag_name: ${{ env.RELEASE_VERSION }}-Build
          name: Aegis Tactical ${{ env.RELEASE_VERSION }}-Debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
