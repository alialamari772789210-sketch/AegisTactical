name: Aegis Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  RELEASE_VERSION: v1.0.8

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permissions
        run: |
          chmod +x gradlew
          chmod +x sync.sh
          find . -type f -name "*.sh" -exec chmod +x {} +

      - name: Run Tactical Sync
        run: ./sync.sh

      - name: Build Final Release APK
        run: ./gradlew assembleRelease --stacktrace --info

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          files: app/build/outputs/apk/release/*.apk
          tag_name: ${{ env.RELEASE_VERSION }}-Final
          name: Aegis Tactical ${{ env.RELEASE_VERSION }}-Stable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
