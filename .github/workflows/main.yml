name: Aegis Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  RELEASE_VERSION: v1.0.8

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # محاولة إصلاح الـ Wrapper إذا كان مفقوداً
      - name: Setup Gradle Wrapper
        run: gradle wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # بناء نسخة Debug لأنها لا تحتاج لمفاتيح تشفير معقدة
      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace

      # رفع الملف الناتج إلى قسم Releases في GitHub
      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/debug/*.apk
          tag_name: ${{ env.RELEASE_VERSION }}-Build
          name: Aegis Tactical ${{ env.RELEASE_VERSION }}-Debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
