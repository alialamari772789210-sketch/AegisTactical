name: Build and Release Aegis Tactical

on:
  push:
    branches: [ "main", "Master", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permissions
      run: |
        chmod +x gradlew
        chmod +x sync.sh
      # الآن سيبحث النظام عن الملفات في المجلد الرئيسي مباشرة

    - name: Run Sync Script
      run: ./sync.sh
      # تشغيل نص المزامنة التكتيكي قبل البدء

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    - name: Rename and Package APK
      run: |
        mkdir -p release-artifacts
        cp app/build/outputs/apk/release/*.apk Aegis_Tactical_v1.0.8.M.apk

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Aegis-Tactical-V108M
        path: Aegis_Tactical_v1.0.8.M.apk

    - name: Deploy to GitHub Releases
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/Master'
      with:
        files: Aegis_Tactical_v1.0.8.M.apk
        tag_name: v1.0.8.M-Release
        name: Aegis Tactical v1.0.8.M [Voice Master]
        body: |
          ### 🛰️ واجهة إيجيس التكتيكية - الإصدار السيادي
          **المهندس المعماري:** علي العماري
          
          تم تحديث النظام وتفعيل وحدات الأوامر الصوتية.
          الحالة: تم التحقق من سلامة البيانات بنجاح.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
