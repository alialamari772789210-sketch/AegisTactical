name: Aegis Tactical Final Build

on:
  push:
    branches: [ "Master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Clean & Grant Permissions
      run: |
        chmod +x gradlew
        chmod +x sync.sh
        # تأمين المسار لضمان عدم حدوث خطأ الخادم

    - name: Execute Sync
      run: ./sync.sh || echo "Sync skipped or not found"

    - name: Build APK
      run: ./gradlew assembleRelease

    - name: Deploy Master APK
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/*.apk
        tag_name: v1.0.8.M
        name: Aegis Tactical v1.0.8-Master
        body: "النسخة السيادية المعتمدة - تم معالجة أخطاء المزامنة."
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
